<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>קטלוג ריהוט מעלה יוסף 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, 'Noto Sans Hebrew', sans-serif;
  direction: rtl;
  color: #2C2416;
}

/* ══════════════════
   PRINT BAR (screen)
══════════════════ */
.print-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: #5C3A15; color: #fff;
  padding: 11px 28px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 14px rgba(0,0,0,.35);
}
.print-btn {
  background: #fff; color: #5C3A15;
  border: none; border-radius: 7px;
  padding: 9px 28px; font-family: inherit;
  font-size: .95rem; font-weight: 700; cursor: pointer;
}
.print-btn:hover { background: #f5f0e8; }
.tip-bar {
  max-width: 860px; margin: 0 auto;
  background: #fffbe6; border: 1.5px solid #e6c840;
  border-radius: 7px; padding: 8px 16px;
  font-size: .8rem; color: #6b5000; direction: rtl;
}

@media screen {
  body { background: #D8CEBA; padding-top: 58px; }
  .catalog-wrap { padding: 16px 12px 48px; }

  /* A4 preview */
  .page {
    background: #fff;
    width: 210mm; min-height: 297mm;
    margin: 18px auto;
    padding: 9mm 10mm;
    box-shadow: 0 4px 22px rgba(0,0,0,.2);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
}

/* ══════════════════
   PRINT
══════════════════ */
@media print {
  body { background: #fff; }
  .print-bar, .tip-bar { display: none; }
  .catalog-wrap { padding: 0; }

  /* Each .page = exactly one A4 sheet */
  .page {
    width: 210mm;
    height: 297mm;
    padding: 9mm 10mm;
    position: relative;
    overflow: hidden;
    page-break-after: always;
    page-break-inside: avoid;
    background: #fff;
  }
  .page:last-child { page-break-after: auto; }
}

/* ══════════════════
   COVER
══════════════════ */
.cover {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 279mm; /* 297 - 18mm padding */
  gap: 0;
}
.cover-hero {
  width: 100%;
  background: #5C3A15;
  color: #fff;
  border-radius: 12px;
  padding: 32px 44px 28px;
  text-align: center;
  margin-bottom: 20px;
}
.cover-title { font-size: 23pt; font-weight: 900; line-height: 1.2; margin-bottom: 8px; }
.cover-org   { font-size: 11pt; opacity: .85; }
.cover-yr    { display:inline-block; background:rgba(255,255,255,.18); border-radius:14px; padding:3px 16px; font-size:10pt; margin-top:8px; }

.cover-row   { display:flex; gap:12px; width:100%; margin-bottom:16px; }
.cover-stat  {
  flex:1; background:#F9F5EF; border:1.5px solid #DDD3C0;
  border-radius:10px; padding:14px 8px; text-align:center;
}
.cover-stat-n { font-size:22pt; font-weight:900; color:#5C3A15; line-height:1; }
.cover-stat-l { font-size:7.5pt; color:#7A6E5F; margin-top:3px; }

.cover-cats {
  width:100%; background:#F9F5EF; border:1.5px solid #DDD3C0;
  border-radius:10px; padding:13px 17px; margin-bottom:16px; text-align:right;
}
.cover-cats-h { font-size:9pt; font-weight:700; color:#5C3A15; margin-bottom:8px; }
.cover-chips  { display:flex; flex-wrap:wrap; gap:6px; }
.chip {
  background:#5C3A15; color:#fff;
  border-radius:16px; padding:3px 12px;
  font-size:7.5pt; font-weight:600;
}

.cover-note { font-size:7pt; color:#9A8E7F; line-height:1.75; text-align:center; }

/* ══════════════════
   PAGE HEADER / FOOTER
══════════════════ */
.pg-head {
  display:flex; align-items:center; gap:7px;
  border-bottom:2.5px solid #5C3A15;
  padding-bottom:5px; margin-bottom:5px;
  /* fixed height = 12mm */
  height: 12mm;
}
.pg-cat   { font-size:13pt; font-weight:800; color:#5C3A15; }
.pg-badge {
  background:#5C3A15; color:#fff;
  border-radius:50%; width:20px; height:20px;
  display:flex; align-items:center; justify-content:center;
  font-size:7.5pt; font-weight:700;
}
.pg-pager { margin-right:auto; font-size:7.5pt; color:#B0A090; }

.pg-foot {
  position:absolute; bottom:6mm; left:10mm; right:10mm;
  display:flex; justify-content:space-between;
  font-size:6.5pt; color:#C4A880;
  border-top:.5px solid #EEE8DE; padding-top:2.5px;
}

/* ══════════════════════════════════════════════
   PRODUCTS GRID — 3 columns, FIXED row height

   Page inner height = 297 - 18mm padding = 279mm
   pg-head = 12mm, gap-below-head = 5mm, pg-foot ≈ 8mm
   grid available = 279 - 12 - 5 - 8 = 254mm
   3 rows + 2×2mm gaps = 254 - 4 = 250mm  → each row = 83mm

   Card = 83mm:
     • image wrap = 61mm
     • info       = 22mm
══════════════════════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 83mm;   /* ← THE FIX: explicit row height, no forced empty rows */
  gap: 2mm;
  overflow: hidden;
  max-height: 254mm;      /* safety cap */
}

.card {
  height: 83mm;           /* match grid-auto-rows */
  border: 1.5px solid #DDD3C0;
  border-radius: 7px;
  overflow: hidden;
  display: flex; flex-direction: column;
  background: #fff;
  page-break-inside: avoid;
}

/* Image area — fixed 61mm, no flex magic needed */
.card-img {
  width: 100%;
  height: 61mm;           /* explicit mm height */
  flex-shrink: 0;
  background: #F5F0E8;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-img img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}

/* Info area — fixed 22mm */
.card-info {
  height: 22mm;           /* explicit mm height */
  flex-shrink: 0;
  padding: 2.5mm 3.5mm 2mm;
  overflow: hidden;
  border-top: 1px solid #F0E8DC;
}
.badges { display:flex; gap:3px; flex-wrap:wrap; align-items:center; margin-bottom:2px; }
.b-id      { background:#5C3A15; color:#fff; border-radius:3px; padding:1px 5px; font-size:7pt; font-weight:700; }
.b-gift    { background:#D4A843; color:#fff; border-radius:3px; padding:1px 5px; font-size:6.5pt; font-weight:700; }
.b-palette { background:#2E6644; color:#fff; border-radius:3px; padding:1px 4px; font-size:6pt; font-weight:600; }
.b-fabric  { background:#5A3E80; color:#fff; border-radius:3px; padding:1px 4px; font-size:6pt; font-weight:600; }
.sku   { display:block; font-size:6pt; color:#9A8E7F; margin-bottom:2px; }
.desc  { font-size:7.5pt; font-weight:600; color:#2C2416; line-height:1.3; }
.clr   { font-size:6pt; color:#7A6E5F; margin-top:1px; }

/* ══════════════════
   VARIANT PAGES
══════════════════ */
.var-head {
  text-align:center;
  border-bottom:2.5px solid #5C3A15;
  padding-bottom:6px; margin-bottom:8px;
}
.var-title { font-size:14pt; font-weight:800; color:#5C3A15; margin-bottom:3px; }
.var-sub   { font-size:9pt; color:#7A6E5F; }
.var-note  {
  background:#F9F5EF; border:1px solid #DDD3C0;
  border-radius:7px; padding:7px 14px;
  font-size:8pt; color:#4A3010; text-align:center;
  margin-bottom:14px; line-height:1.65;
}

/* Palette: 4 across, 2 rows (7 items = 4+3) */
.palette-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Fabric: 4 across, single row */
.fabric-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.vcard {
  border:2px solid #DDD3C0; border-radius:9px;
  overflow:hidden; background:#fff; text-align:center;
}
.vcard img {
  width:100%; aspect-ratio:1;
  object-fit:cover; display:block;
}
.fabric-grid .vcard img { aspect-ratio:4/3; }

.vcard-foot { padding:6px 8px 7px; background:#F5F0E8; }
.vcard-name { font-size:9.5pt; font-weight:700; color:#5C3A15; }
.vcard-id   { font-size:7pt; color:#9A8E7F; }
.fabric-grid .vcard-name { font-size:11pt; }
.fabric-grid .vcard-id   { font-size:8pt; }
</style>
</head>

  {id:'R3',  sku:'IL0010',           cat:'שטיחים',       d:'שטיח 300×200 ס"מ',                  c:'',                        img:'R3.PNG'},
  // מלונאי (5)
  {id:'M1',  sku:'PJ026-FD-2045L',   cat:'מלונאי',       d:'כספת 20×37×45 ס"מ',                c:'שחור',                    img:'M1.png'},
  {id:'M2',  sku:'IL0004',           cat:'מלונאי',       d:'חבילת בונוס מלונאי',               c:'כרית, מגש, ואזות, שטיח, מראה, תמונות, קומקום', img:'m2.PNG', gift:1},
  {id:'M3',  sku:'IL0004',           cat:'מלונאי',       d:'חבילת בונוס מלונאי',               c:'כרית, מגש, ואזות, שטיח, מראה, תמונות, קומקום', img:'M3.PNG', gift:1},
  {id:'M4',  sku:'M07371',           cat:'מלונאי',       d:'פח אשפה שחור 30 ליטר',              c:'שחור',                    img:'M4.PNG'},
  {id:'M5',  sku:'M07371',           cat:'מלונאי',       d:'פח אשפה נירוסטה 30 ליטר',           c:'נירוסטה',                 img:'M5.PNG'},
];

const PALETTE = [
  {id:'P1', name:'מריאנה',  img:'P1_MARIANA .jpg'},
  {id:'P2', name:'נקסוס',   img:'P2_NEXUS.jpg'},
  {id:'P3', name:'פיניש',   img:'P3_FINISH.jpg'},
  {id:'P4', name:'לבן',     img:'P4_WHITE.jpg'},
  {id:'P5', name:'שחור',    img:'P5_BLACK.jpg'},
  {id:'P6', name:'אנטיק',   img:'P6_ANTIC.jpg'},
  {id:'P7', name:'ולוריה',  img:'P7_VELORIA.jpeg'},
];
const FABRIC = [
  {id:'James', name:"ג'יימס", img:'bd_James-90052.jpg'},
  {id:'Henry', name:'הנרי',   img:'bd_Henry-40003.jpg'},
  {id:'Leo',   name:'ליאו',   img:'Bd_LEO-50004.jpg'},
  {id:'Kim',   name:'קים',    img:'bd_kim-20015.jpg'},
];

const CATS = ['כורסאות','כיסאות','כיסאות בר','פינת ישיבה',
              'פינת קפה','פינת אוכל','שינה',
              'שולחנות סלון','מזנונים','שטיחים','מלונאי'];

/* ════════════════════════
   HELPERS
════════════════════════ */
const BLANK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3Crect fill='%23F5F0E8'/%3E%3C/svg%3E";

function ip(f) {
  // handle spaces in filenames (e.g. "P1_MARIANA .jpg")
  return 'pic/' + f.split('').map(ch => ch === ' ' ? '%20' : ch).join('');
}
function chunk(a, n) {
  const r = [];
  for (let i = 0; i < a.length; i += n) r.push(a.slice(i, i + n));
  return r;
}
function page(html) {
  const d = document.createElement('div');
  d.className = 'page';
  d.innerHTML = html;
  return d;
}

/* ════════════════════════
   CARD HTML
════════════════════════ */
function cardHTML(p) {
  const badges = [
    `<span class="b-id">${p.id}</span>`,
    p.gift    ? '<span class="b-gift">🎁 מתנה</span>'         : '',
    p.palette ? '<span class="b-palette">🎨 בחירת פלטה</span>' : '',
    p.fabric  ? '<span class="b-fabric">🪡 בחירת בד</span>'    : '',
  ].join('');

  return `<div class="card">
    <div class="card-img">
      <img src="${ip(p.img)}" alt="${p.d}" loading="lazy"
        onerror="this.src='${BLANK}';this.onerror=null">
    </div>
    <div class="card-info">
      <div class="badges">${badges}</div>
      <span class="sku">${p.sku}</span>
      <div class="desc">${p.d}</div>
      ${p.c ? `<div class="clr">${p.c}</div>` : ''}
    </div>
  </div>`;
}

/* ════════════════════════
   PAGE FOOTER
════════════════════════ */
function footerHTML(cat) {
  return `<div class="pg-foot">
    <span>קטלוג ריהוט שדרוג צימרים מעלה יוסף 2026</span>
    <span>${cat}</span>
  </div>`;
}

/* ════════════════════════
   BUILD
════════════════════════ */
function build() {
  const wrap = document.getElementById('catalog');

  /* ── Cover ── */
  const counts  = {};
  const activeCats = CATS.filter(c => { counts[c] = P.filter(p => p.cat === c).length; return counts[c] > 0; });
  wrap.appendChild(page(`
    <div class="cover">
      <div class="cover-hero">
        <div class="cover-title">קטלוג ריהוט<br>שדרוג צימרים מעלה יוסף</div>
        <div class="cover-org">מועצה אזורית מעלה יוסף — גליל מערבי</div>
        <span class="cover-yr">2026</span>
      </div>
      <div class="cover-row">
        <div class="cover-stat"><div class="cover-stat-n">${P.length}</div><div class="cover-stat-l">פריטים</div></div>
        <div class="cover-stat"><div class="cover-stat-n">${activeCats.length}</div><div class="cover-stat-l">קטגוריות</div></div>
        <div class="cover-stat"><div class="cover-stat-n">7</div><div class="cover-stat-l">אפשרויות פלטה</div></div>
        <div class="cover-stat"><div class="cover-stat-n">4</div><div class="cover-stat-l">דגמי בד</div></div>
      </div>
      <div class="cover-cats">
        <div class="cover-cats-h">קטגוריות הקטלוג:</div>
        <div class="cover-chips">
          ${activeCats.map(c => `<span class="chip">${c} (${counts[c]})</span>`).join('')}
        </div>
      </div>
      <div class="cover-note">
        ★ קטלוג זה מיועד לבחירת פריטי ריהוט לצימרים במסגרת תוכנית שדרוג 2026<br>
        ★ שולחנות L1–L8 דורשים בחירת צורת פלטה (עגולה / מרובעת) + צבע פלטה — ראו עמוד פלטות<br>
        ★ S1 ו-S2 בקטגוריית שינה דורשים בחירת דגם בד — ראו עמוד בדים
      </div>
    </div>
  `));

  /* ── Product pages by category ── */
  let paletteDone = false;

  activeCats.forEach(cat => {
    const items  = P.filter(p => p.cat === cat);
    const pages  = chunk(items, 9);
    const total  = items.length;

    pages.forEach((slice, pi) => {
      const pager = pages.length > 1 ? `<span class="pg-pager">${pi+1} / ${pages.length}</span>` : '';
      wrap.appendChild(page(`
        <div class="pg-head">
          <span class="pg-cat">${cat}</span>
          <span class="pg-badge">${total}</span>
          ${pager}
        </div>
        <div class="grid">
          ${slice.map(cardHTML).join('')}
        </div>
        ${footerHTML(cat)}
      `));
    });

    /* Palette page — after פינת אוכל */
    if (cat === 'פינת אוכל' && !paletteDone) {
      paletteDone = true;
      wrap.appendChild(page(`
        <div class="var-head">
          <div class="var-title">🎨 בחירת פלטה לשולחנות</div>
          <div class="var-sub">7 אפשרויות צבע — פינת קפה L1–L7 ופינת אוכל L8</div>
        </div>
        <div class="var-note">
          לכל שולחן יש לבחור: <strong>צורת פלטה</strong> (עגולה — קוטר 70 ס"מ | מרובעת — 70×70 ס"מ)<br>
          + <strong>צבע פלטה</strong> מבין 7 האפשרויות הבאות
        </div>
        <div class="palette-grid">
          ${PALETTE.map(v => `
            <div class="vcard">
              <img src="${ip(v.img)}" alt="${v.name}" onerror="this.src='${BLANK}';this.onerror=null">
              <div class="vcard-foot">
                <div class="vcard-name">${v.name}</div>
                <div class="vcard-id">${v.id}</div>
              </div>
            </div>`).join('')}
        </div>
        ${footerHTML('אפשרויות פלטה לשולחנות')}
      `));
    }

    /* Fabric page — after שינה */
    if (cat === 'שינה') {
      wrap.appendChild(page(`
        <div class="var-head">
          <div class="var-title">🪡 בחירת בד למוצרי שינה</div>
          <div class="var-sub">4 דגמי בד — לבסיס מיטה (S1) ולגב מיטה (S2)</div>
        </div>
        <div class="var-note">
          בחרו דגם בד אחד עבור בסיס המיטה המחולק 160×190 ס"מ (S1) וגב המיטה 110 ס"מ (S2)
        </div>
        <div class="fabric-grid">
          ${FABRIC.map(v => `
            <div class="vcard">
              <img src="${ip(v.img)}" alt="${v.name}" onerror="this.src='${BLANK}';this.onerror=null">
              <div class="vcard-foot">
                <div class="vcard-name">${v.name}</div>
                <div class="vcard-id">${v.id}</div>
              </div>
            </div>`).join('')}
        </div>
        ${footerHTML('דגמי בד למוצרי שינה')}
      `));
    }
  });
}

build();
</script>
</body>
</html>
