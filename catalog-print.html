<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>קטלוג ריהוט מעלה יוסף 2026</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, 'Noto Sans Hebrew', sans-serif;
  direction: rtl;
  background: #C0B09A;
  color: #2C2416;
}

/* ══ BAR ══ */
#bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: #4A2E0E; color: #fff;
  padding: 10px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,.45);
}
#bar-left { display: flex; flex-direction: column; gap: 2px; }
#bar-title { font-size: .95rem; font-weight: 700; }
#bar-status { font-size: .78rem; opacity: .8; min-height: 1em; }
#pdf-btn {
  background: #fff; color: #4A2E0E;
  border: none; border-radius: 7px;
  padding: 10px 30px; font-family: inherit;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
#pdf-btn:hover:not(:disabled) { background: #f0e8dc; }
#pdf-btn:disabled { opacity: .55; cursor: wait; }

body { padding-top: 54px; }
#wrap { padding: 18px 12px 52px; }

/* ══════════════════════════════════════════════
   PAGE  —  exactly one A4 sheet: 210mm × 297mm
   The html2canvas will capture this element as-is.
══════════════════════════════════════════════ */
.page {
  background: #fff;
  width: 210mm;
  height: 297mm;          /* fixed – prevents short pages */
  padding: 9mm 10mm 8mm;
  margin: 16px auto;
  overflow: hidden;       /* nothing bleeds – no cut-off */
  position: relative;
  box-shadow: 0 4px 22px rgba(0,0,0,.2);
  border-radius: 2px;
  direction: rtl;
}

/* ══ PAGE HEADER ══ */
.ph {
  height: 12mm;
  display: flex; align-items: center; gap: 7px;
  border-bottom: 2.5px solid #4A2E0E;
  padding-bottom: 4px;
  margin-bottom: 4mm;
}
.ph-cat { font-size: 14pt; font-weight: 800; color: #4A2E0E; }
.ph-n {
  background: #4A2E0E; color: #fff;
  border-radius: 50%; width: 21px; height: 21px;
  display: flex; align-items: center; justify-content: center;
  font-size: 7.5pt; font-weight: 700;
}
.ph-pg { margin-right: auto; font-size: 7.5pt; color: #B0A090; }

/* ══ PAGE FOOTER ══ */
.pf {
  position: absolute; bottom: 5mm; left: 10mm; right: 10mm;
  display: flex; justify-content: space-between;
  font-size: 6.5pt; color: #C4A880;
  border-top: .5px solid #EEE8DE; padding-top: 2.5px;
}

/* ══════════════════════════════════════════════
   GRID  —  3 columns, fixed row height = 83mm

   Available height:
     297mm total
   - 17mm  top+bottom padding (9+8)
   - 12mm  header (.ph)
   -  4mm  gap below header (margin-bottom)
   -  8mm  footer zone
   = 256mm for grid

   3 rows × 83mm + 2 gaps × 1.5mm = 252mm  ✓
══════════════════════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 83mm;   /* NEVER forces empty rows */
  gap: 1.5mm;
  max-height: 252mm;
  overflow: hidden;
}

/* ══ CARD ══ */
.card {
  height: 83mm;
  border: 1.5px solid #DDD3C0;
  border-radius: 7px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: #fff;
}

/*
  Image area: 61mm fixed height.
  Use flex centering — works on screen (which html2canvas captures).
  NO object-fit (unreliable in some print renderers) — use max-width/max-height instead.
*/
.ci {
  height: 61mm;          /* explicit mm — no flex:1 */
  flex-shrink: 0;
  background: #F5F0E8;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 3px;
}
.ci img {
  max-width: 100%;
  max-height: 59mm;      /* slight inset so image never touches edge */
  width: auto;
  height: auto;
  display: block;
  /* NO loading="lazy" — images must all load immediately */
}

/* Info area: 22mm fixed height */
.info {
  height: 22mm;
  flex-shrink: 0;
  padding: 2mm 3mm 1.5mm;
  overflow: hidden;
  border-top: 1px solid #EEE6D8;
  background: #fff;
}
.bads { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; margin-bottom: 2px; }
.bid  { background: #4A2E0E; color: #fff; border-radius: 3px; padding: 1px 5px; font-size: 7pt;   font-weight: 700; }
.bgft { background: #D4A843; color: #fff; border-radius: 3px; padding: 1px 5px; font-size: 6.5pt; font-weight: 700; }
.bpal { background: #2E6644; color: #fff; border-radius: 3px; padding: 1px 4px; font-size: 6pt;   font-weight: 600; }
.bfab { background: #5A3E80; color: #fff; border-radius: 3px; padding: 1px 4px; font-size: 6pt;   font-weight: 600; }
.sku  { display: block; font-size: 6pt; color: #9A8E7F; margin-bottom: 1.5px; }
.dsc  { font-size: 7.5pt; font-weight: 600; color: #2C2416; line-height: 1.3; }
.clr  { font-size: 6pt; color: #7A6E5F; margin-top: 1px; }

/* ══ COVER ══ */
.cover-inner {
  height: calc(297mm - 17mm);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.c-hero {
  width: 100%; background: #4A2E0E; color: #fff;
  border-radius: 12px; padding: 28px 40px 24px;
  text-align: center; margin-bottom: 18px;
}
.c-t { font-size: 22pt; font-weight: 900; line-height: 1.2; margin-bottom: 8px; }
.c-o { font-size: 10.5pt; opacity: .84; }
.c-y { display: inline-block; background: rgba(255,255,255,.18); border-radius: 14px; padding: 3px 16px; font-size: 10pt; margin-top: 7px; }

.c-stats { display: flex; gap: 10px; width: 100%; margin-bottom: 16px; }
.c-s { flex: 1; background: #F9F5EF; border: 1.5px solid #DDD3C0; border-radius: 9px; padding: 13px 8px; text-align: center; }
.c-sn { font-size: 21pt; font-weight: 900; color: #4A2E0E; line-height: 1; }
.c-sl { font-size: 7.5pt; color: #7A6E5F; margin-top: 3px; }

.c-cats { width: 100%; background: #F9F5EF; border: 1.5px solid #DDD3C0; border-radius: 9px; padding: 12px 16px; margin-bottom: 16px; }
.c-ch { font-size: 9pt; font-weight: 700; color: #4A2E0E; margin-bottom: 8px; }
.c-cl { display: flex; flex-wrap: wrap; gap: 5px; }
.chip { background: #4A2E0E; color: #fff; border-radius: 14px; padding: 3px 11px; font-size: 7.5pt; font-weight: 600; }
.c-note { font-size: 7pt; color: #9A8E7F; line-height: 1.8; text-align: center; }

/* ══ VARIANT PAGES ══ */
.v-head { text-align: center; border-bottom: 2.5px solid #4A2E0E; padding-bottom: 6px; margin-bottom: 8px; }
.v-t { font-size: 14pt; font-weight: 800; color: #4A2E0E; margin-bottom: 3px; }
.v-s { font-size: 9pt; color: #7A6E5F; }
.v-n { background: #F9F5EF; border: 1px solid #DDD3C0; border-radius: 7px; padding: 7px 14px; font-size: 8pt; color: #4A2010; text-align: center; margin-bottom: 14px; line-height: 1.65; }

.pgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.fgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.vc { border: 2px solid #DDD3C0; border-radius: 9px; overflow: hidden; background: #fff; text-align: center; }
.vc img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.fgrid .vc img { aspect-ratio: 4/3; }
.vcf { padding: 6px 8px 7px; background: #F5F0E8; }
.vcn { font-size: 9.5pt; font-weight: 700; color: #4A2E0E; }
.vci { font-size: 7pt; color: #9A8E7F; }
.fgrid .vcn { font-size: 11pt; }
.fgrid .vci { font-size: 8pt; }

/* ══ PRINT (fallback) ══ */
@media print {
  #bar { display: none; }
  body { background: #fff; padding: 0; }
  #wrap { padding: 0; }
  .page { margin: 0; box-shadow: none; border-radius: 0; page-break-after: always; }
}
</style>
</head>

/* ════════════ HELPERS ════════════ */
function ip(f) { return 'pic/' + f.replace(/ /g, '%20'); }
function chunk(a, n) {
  const r = [];
  for (let i = 0; i < a.length; i += n) r.push(a.slice(i, i + n));
  return r;
}
// Create a real img element with onerror fallback (more reliable than innerHTML)
function makeImg(src, alt, cls) {
  const img = document.createElement('img');
  img.src = ip(src);
  img.alt = alt;
  if (cls) img.className = cls;
  // NO loading="lazy" — load everything immediately
  img.onerror = function() {
    this.style.opacity = '0.3';
    this.onerror = null;
  };
  return img;
}
function pf(cat) {
  return `<div class="pf"><span>קטלוג ריהוט שדרוג צימרים מעלה יוסף 2026</span><span>${cat}</span></div>`;
}

/* ════════════ CARD ════════════ */
function makeCard(p) {
  const card = document.createElement('div');
  card.className = 'card';

  // Image container
  const ci = document.createElement('div');
  ci.className = 'ci';
  ci.appendChild(makeImg(p.img, p.d));
  card.appendChild(ci);

  // Info
  const badges = [
    `<span class="bid">${p.id}</span>`,
    p.gift ? '<span class="bgft">🎁 מתנה</span>' : '',
    p.pal  ? '<span class="bpal">🎨 פלטה</span>' : '',
    p.fab  ? '<span class="bfab">🪡 בד</span>'   : '',
  ].join('');

  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `
    <div class="bads">${badges}</div>
    <span class="sku">${p.sku}</span>
    <div class="dsc">${p.d}</div>
    ${p.c ? `<div class="clr">${p.c}</div>` : ''}`;
  card.appendChild(info);

  return card;
}

/* ════════════ IMAGE LOADING WAIT ════════════ */
function waitForImages() {
  const imgs = [...document.querySelectorAll('img')];
  return Promise.all(imgs.map(img => new Promise(res => {
    if (img.complete && img.naturalWidth > 0) { res(); return; }
    img.addEventListener('load',  res, { once: true });
    img.addEventListener('error', res, { once: true });
  })));
}

/* ════════════════════════════════════════════════════════
   PRE-CONVERT ALL IMAGES → data: URLs

   Reason: opening a local file (file://) causes "Tainted canvas"
   — images drawn from file:// block canvas.toDataURL().
   Converting to data: URLs first prevents canvas tainting.
════════════════════════════════════════════════════════ */
async function convertImagesToDataURLs(statusEl) {
  const imgs = [...document.querySelectorAll('.page img')]
    .filter(img => img.src && !img.src.startsWith('data:'));

  let done = 0;
  // Process all images in parallel
  await Promise.all(imgs.map(async img => {
    try {
      const resp = await fetch(img.src);
      const blob = await resp.blob();
      const dataURL = await new Promise((res, rej) => {
        const fr = new FileReader();
        fr.onloadend = () => res(fr.result);
        fr.onerror   = rej;
        fr.readAsDataURL(blob);
      });
      img.src = dataURL;   // replace with data: URL — canvas-safe
    } catch (e) {
      console.warn('img convert failed (will skip):', img.alt || img.src);
    }
    done++;
    if (statusEl) statusEl.textContent = `ממיר תמונות ${done}/${imgs.length}...`;
  }));
}

/* ════════════ PDF GENERATION ════════════ */
async function generatePDF() {
  const btn    = document.getElementById('pdf-btn');
  const status = document.getElementById('bar-status');
  btn.disabled = true;
  btn.textContent = '⏳ מעבד...';

  try {
    // 1. Wait for images to load
    status.textContent = 'ממתין לטעינת תמונות...';
    await waitForImages();

    // 2. Convert img srcs → data: URLs (fixes tainted-canvas on file://)
    await convertImagesToDataURLs(status);
    await new Promise(r => setTimeout(r, 400)); // repaint settle

    // 3. Capture each page
    const pages = [...document.querySelectorAll('.page')];
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });

    for (let i = 0; i < pages.length; i++) {
      status.textContent = `מעבד עמוד ${i + 1} / ${pages.length}...`;
      await new Promise(r => setTimeout(r, 40));

      const canvas = await html2canvas(pages[i], {
        scale: 2,
        backgroundColor: '#ffffff',
        logging: false,
      });

      const imgData = canvas.toDataURL('image/jpeg', 0.88);
      if (i > 0) doc.addPage();
      doc.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    }

    // 4. Download
    doc.save('קטלוג_ריהוט_מעלה_יוסף_2026.pdf');
    status.textContent = `✅ PDF נוצר! (${pages.length} עמודים)`;

  } catch (e) {
    console.error('PDF error:', e);
    status.textContent = '❌ שגיאה: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '⬇️ צור PDF';
}
