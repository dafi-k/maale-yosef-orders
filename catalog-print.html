<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קטלוג ריהוט מעלה יוסף 2026 — להדפסה</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, 'Noto Sans Hebrew', sans-serif;
  direction: rtl;
  background: #E8DFD0;
}

/* ══════════════════════════════════════
   SCREEN ONLY
══════════════════════════════════════ */
@media screen {
  body { padding-top: 64px; }

  .print-bar {
    position: fixed; top: 0; right: 0; left: 0;
    background: #6B4E2A; color: white;
    padding: 12px 28px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 1000;
    box-shadow: 0 3px 16px rgba(0,0,0,0.35);
  }
  .print-bar-title { font-size: 1rem; font-weight: 700; }
  .print-bar-sub { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }
  .print-btn {
    background: white; color: #6B4E2A;
    border: none; padding: 10px 32px;
    border-radius: 8px; font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .print-btn:hover { background: #f5f0e8; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
  .print-tip {
    max-width: 860px; margin: 14px auto 0;
    background: #fff3cd; border: 1.5px solid #f0c040; border-radius: 8px;
    padding: 10px 18px; font-size: 0.85rem; color: #7a5500;
  }
  .catalog-container { padding: 16px 20px 40px; }

  .page {
    background: white;
    width: 210mm; min-height: 297mm;
    margin: 20px auto;
    padding: 12mm 10mm 14mm;
    box-shadow: 0 4px 28px rgba(0,0,0,0.22);
    border-radius: 3px;
    direction: rtl;
    position: relative;
    display: flex; flex-direction: column;
  }
}

/* ══════════════════════════════════════
   PRINT ONLY
══════════════════════════════════════ */
@media print {
  body { background: white; padding: 0; direction: rtl; }
  .print-bar, .print-tip { display: none !important; }
  .catalog-container { padding: 0; }

  .page {
    width: 210mm; height: 297mm;
    padding: 9mm 10mm 10mm;
    page-break-after: always;
    page-break-inside: avoid;
    overflow: hidden;
    direction: rtl;
    position: relative;
    display: flex; flex-direction: column;
    margin: 0;
  }
  .page:last-child { page-break-after: auto; }
}

/* ══════════════════════════════════════
   COVER PAGE
══════════════════════════════════════ */
.cover-page { align-items: center; justify-content: center; text-align: center; }

.cover-hero {
  background: linear-gradient(145deg, #5C3F1E 0%, #8B6840 50%, #6B4E2A 100%);
  color: white; border-radius: 14px;
  padding: 36px 48px 32px; margin-bottom: 28px; width: 100%;
}
.cover-main-title { font-size: 26pt; font-weight: 900; line-height: 1.15; margin-bottom: 10px; }
.cover-subtitle { font-size: 12.5pt; opacity: 0.88; margin-bottom: 5px; }
.cover-year {
  display: inline-block;
  background: rgba(255,255,255,0.18); border-radius: 20px;
  padding: 4px 20px; font-size: 11pt; margin-top: 8px; opacity: 0.9;
}
.cover-divider {
  width: 80px; height: 3px;
  background: linear-gradient(90deg, transparent, #C49A6C, transparent);
  margin: 0 auto 22px;
}
.cover-stats {
  display: flex; gap: 16px; justify-content: center;
  margin-bottom: 22px;
}
.cover-stat {
  background: white; border: 2px solid #DDD3C0; border-radius: 12px;
  padding: 18px 28px; text-align: center; flex: 1; max-width: 160px;
}
.cover-stat-num { font-size: 26pt; font-weight: 900; color: #6B4E2A; line-height: 1; }
.cover-stat-label { font-size: 9pt; color: #7A6E5F; margin-top: 4px; }

.cover-cats-box {
  background: #F9F5EF; border: 1.5px solid #DDD3C0; border-radius: 12px;
  padding: 16px 20px; width: 100%; text-align: right; margin-bottom: 18px;
}
.cover-cats-title { font-size: 10pt; font-weight: 700; color: #6B4E2A; margin-bottom: 10px; }
.cover-cats-list { display: flex; flex-wrap: wrap; gap: 7px; }
.cover-cat-chip {
  background: #6B4E2A; color: white;
  border-radius: 20px; padding: 4px 14px;
  font-size: 8.5pt; font-weight: 600;
}

.cover-notes {
  font-size: 8pt; color: #9A8E7F; line-height: 1.7;
  text-align: center; max-width: 420px;
}

/* ══════════════════════════════════════
   PAGE HEADER & FOOTER
══════════════════════════════════════ */
.page-header {
  display: flex; align-items: center; gap: 8px;
  border-bottom: 2.5px solid #6B4E2A;
  padding-bottom: 7px; margin-bottom: 8px;
  flex-shrink: 0;
}
.page-cat-name { font-size: 13.5pt; font-weight: 800; color: #6B4E2A; }
.page-cat-badge {
  background: #6B4E2A; color: white;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8pt; font-weight: 700; flex-shrink: 0;
}
.page-pager { font-size: 8pt; color: #B0A090; margin-right: auto; }

.page-footer {
  position: absolute; bottom: 7mm; left: 10mm; right: 10mm;
  display: flex; justify-content: space-between;
  font-size: 7pt; color: #C4A880;
  border-top: 1px solid #EEE8DE; padding-top: 3px;
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   PRODUCTS GRID — 3 × 3
══════════════════════════════════════ */
.products-grid {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 7px;
  padding-bottom: 18px; /* space for footer */
}

/* ── Product card ── */
.product-card {
  border: 1.5px solid #DDD3C0; border-radius: 8px;
  overflow: hidden; display: flex; flex-direction: column;
  background: white;
  page-break-inside: avoid;
}
.product-img-wrap {
  background: #F9F5EF;
  flex: 1; min-height: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.product-img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
}
.product-info {
  padding: 5px 8px 6px;
  background: white; flex-shrink: 0;
}
.product-badges {
  display: flex; gap: 4px; align-items: center;
  margin-bottom: 3px; flex-wrap: wrap;
}
.badge-id {
  background: #6B4E2A; color: white;
  border-radius: 3px; padding: 1px 6px;
  font-size: 7.5pt; font-weight: 700; flex-shrink: 0;
}
.badge-gift {
  background: #D4A843; color: white;
  border-radius: 3px; padding: 1px 6px;
  font-size: 7pt; font-weight: 700;
}
.badge-palette {
  background: #3D7048; color: white;
  border-radius: 3px; padding: 1px 5px;
  font-size: 6.5pt; font-weight: 600;
}
.badge-fabric {
  background: #6B5080; color: white;
  border-radius: 3px; padding: 1px 5px;
  font-size: 6.5pt; font-weight: 600;
}
.product-sku { font-size: 6.5pt; color: #9A8E7F; margin-bottom: 2px; display: block; }
.product-desc { font-size: 8pt; font-weight: 600; color: #2C2416; line-height: 1.25; }
.product-color { font-size: 6.5pt; color: #7A6E5F; margin-top: 1px; }

/* ══════════════════════════════════════
   VARIANT PAGES (palette & fabric)
══════════════════════════════════════ */
.variant-page-hero {
  text-align: center;
  padding: 14px 20px 10px;
  border-bottom: 2.5px solid #6B4E2A;
  margin-bottom: 12px; flex-shrink: 0;
}
.variant-page-title { font-size: 15pt; font-weight: 800; color: #6B4E2A; margin-bottom: 4px; }
.variant-page-sub { font-size: 9.5pt; color: #7A6E5F; }
.variant-applies {
  background: #F9F5EF; border: 1.5px solid #DDD3C0; border-radius: 8px;
  padding: 8px 16px; font-size: 8.5pt; color: #5C4020;
  margin-bottom: 14px; text-align: center; flex-shrink: 0;
}

/* 4-column grid for palette (7 = 4+3) */
.palette-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  flex: 1; min-height: 0;
  align-content: start;
}

/* 4-column grid for fabric */
.fabric-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  align-content: center;
  flex: 1; min-height: 0;
}

.variant-card {
  border: 2px solid #DDD3C0; border-radius: 10px;
  overflow: hidden; background: white; text-align: center;
}
.variant-card-img {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; display: block;
}
.variant-card-footer {
  padding: 6px 8px 7px;
  background: #F9F5EF;
}
.variant-card-name { font-size: 9.5pt; font-weight: 700; color: #6B4E2A; }
.variant-card-id { font-size: 7.5pt; color: #9A8E7F; }

/* Large variant cards for fabric (fewer items, bigger display) */
.fabric-grid .variant-card-img { aspect-ratio: 4/3; }
.fabric-grid .variant-card-footer { padding: 10px 12px 11px; }
.fabric-grid .variant-card-name { font-size: 11pt; }
.fabric-grid .variant-card-id { font-size: 8.5pt; }
</style>
</head>

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
function imgPath(f) { return 'pic/' + encodeURIComponent(f).replace(/%2B/g, '+'); }

const NO_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23F0E8D8'/%3E%3Ctext x='100' y='115' text-anchor='middle' fill='%23C49A6C' font-size='60'%3E🛋%3C/text%3E%3C/svg%3E";

function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

function buildProductCard(p) {
  return `
    <div class="product-card">
      <div class="product-img-wrap">
        <img class="product-img" src="${imgPath(p.img)}" alt="${p.desc}" loading="lazy"
          onerror="this.src='${NO_IMG}';this.onerror=null">
      </div>
      <div class="product-info">
        <div class="product-badges">
          <span class="badge-id">${p.id}</span>
          ${p.isGift  ? '<span class="badge-gift">🎁 מתנה</span>'          : ''}
          ${p.palette ? '<span class="badge-palette">🎨 בחירת פלטה</span>' : ''}
          ${p.fabric  ? '<span class="badge-fabric">🪡 בחירת בד</span>'    : ''}
        </div>
        <span class="product-sku">${p.sku}</span>
        <div class="product-desc">${p.desc}</div>
        ${p.color ? `<div class="product-color">${p.color}</div>` : ''}
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════
// PAGE BUILDERS
// ════════════════════════════════════════════════════════════
function buildCoverPage() {

    <div class="cover-hero">

      </div>
      <div class="cover-stat">

      </div>
      <div class="cover-stat">

        <div class="cover-stat-label">דגמי בד</div>

    </div>
    <div class="cover-cats-box">
      <div class="cover-cats-title">קטגוריות הקטלוג:</div>
      <div class="cover-cats-list">
        ${activeCats.map(c => `<span class="cover-cat-chip">${c} (${counts[c]})</span>`).join('')}
      </div>
    </div>
    <div class="cover-notes">
      ★ קטלוג זה מיועד לבחירת פריטי ריהוט לצימרים במסגרת תוכנית שדרוג 2026<br>
      ★ שולחנות פינת קפה ופינת אוכל דורשים בחירת צורת פלטה (עגולה/מרובעת) וצבע — ראו עמוד פלטות<br>
      ★ בסיס מיטה וגב מיטה דורשים בחירת דגם בד — ראו עמוד בדים
    </div>`;
  return div;
}

function buildProductPage(cat, products, pageNum, totalPages) {
  const catTotal = PRODUCTS.filter(p => p.cat === cat).length;
  const pager = totalPages > 1 ? `(${pageNum} / ${totalPages})` : '';

  const div = document.createElement('div');
  div.className = 'page';
  div.innerHTML = `
    <div class="page-header">
      <span class="page-cat-name">${cat}</span>
      <span class="page-cat-badge">${catTotal}</span>
      ${pager ? `<span class="page-pager">${pager}</span>` : ''}
    </div>
    <div class="products-grid">
      ${products.map(buildProductCard).join('')}
    </div>
    <div class="page-footer">
      <span>קטלוג ריהוט שדרוג צימרים מעלה יוסף 2026</span>
      <span>${cat}</span>
    </div>`;
  return div;
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function renderCatalog() {
  const container = document.getElementById('catalog');
  container.appendChild(buildCoverPage());

  let paletteDone = false;

  CAT_ORDER.forEach(cat => {
    const items = PRODUCTS.filter(p => p.cat === cat);
    if (!items.length) return;

    const pages = chunk(items, 9);
    pages.forEach((pageItems, idx) => {
      container.appendChild(buildProductPage(cat, pageItems, idx + 1, pages.length));
    });

    // Palette page: insert after פינת אוכל (covers both coffee + dining tables)
    if (cat === 'פינת אוכל' && !paletteDone) {
      container.appendChild(buildPalettePage());
      paletteDone = true;
    }

    // Fabric page: insert after שינה
    if (cat === 'שינה') {
      container.appendChild(buildFabricPage());
    }
  });
}

renderCatalog();
